naftiko: 1.0.0-alpha2
info:
  label: Google Content API for Shopping — Orders
  description: 'Google Content API for Shopping — Orders. 1 operations. Lead operation: Google Content API for Shopping List
    Orders. Self-contained Naftiko capability covering one Google Shopping business surface.'
  tags:
  - Google Shopping
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_SHOPPING_API_KEY: GOOGLE_SHOPPING_API_KEY
capability:
  consumes:
  - type: http
    namespace: openapi-orders
    baseUri: https://shoppingcontent.googleapis.com/content/v2.1
    description: Google Content API for Shopping — Orders business capability. Self-contained, no shared references.
    resources:
    - name: merchantId-orders
      path: /{merchantId}/orders
      operations:
      - name: listorders
        method: GET
        description: Google Content API for Shopping List Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: merchantId
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: openapi-orders-rest
    port: 8080
    description: REST adapter for Google Content API for Shopping — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{merchantid}/orders
      name: merchantid-orders
      description: REST surface for merchantId-orders.
      operations:
      - method: GET
        name: listorders
        description: Google Content API for Shopping List Orders
        call: openapi-orders.listorders
        with:
          merchantId: rest.merchantId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openapi-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Content API for Shopping — Orders. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: google-content-api-shopping-list
      description: Google Content API for Shopping List Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openapi-orders.listorders
      with:
        merchantId: tools.merchantId
      outputParameters:
      - type: object
        mapping: $.
